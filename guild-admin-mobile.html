<style>
:root {
  /* Dark theme (default) */
  --bg:     #0d0d0d;
  --bg2:    #181818;
  --bg3:    #242424;
  --white:  #111111;
  --ink:    #f0ece4;
  --ink2:   #c0bcb4;
  --ink3:   #807c78;
  --ink4:   #484440;
  --rule:   #272727;
  --rule2:  #343434;

  --accent:    #c8102e;
  --accent-bg: #1e0508;
  --accent-b:  #6a0018;
  --gold-acc:  #c8a020;

  --bronze: #d4844a; --bronze-bg: #1a0d06; --bronze-b: #6a3a12;
  --silver: #8898a8; --silver-bg: #0d1318; --silver-b: #2a3848;
  --gold:   #c8a020; --gold-bg:   #181200; --gold-b:   #5a4808;
  --plat:   #30a8a8; --plat-bg:   #041616; --plat-b:   #0a4e4e;
  --diamond:#5070e0; --diamond-bg:#060c28; --diamond-b:#1a2a68;
  --master: #9848d0; --master-bg: #100516; --master-b: #380e4c;

  --skill:  #e05030;
  --growth: #22a858;
  --contrib:#5070e0;
  --contin: #c8a020;

  --sans: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;

  --safe-top:    env(safe-area-inset-top,    0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left,   0px);
  --safe-right:  env(safe-area-inset-right,  0px);

  --nav-h: 60px;
  --header-h: 52px;
}

/* Light theme */
[data-theme="light"] {
  --bg:     #f8f6f2;
  --bg2:    #f0ede6;
  --bg3:    #e5e1d8;
  --white:  #ffffff;
  --ink:    #18160f;
  --ink2:   #4a4740;
  --ink3:   #8a8780;
  --ink4:   #bbb8b0;
  --rule:   #e0ddd5;
  --rule2:  #ccc9c0;

  --bronze: #b46a2a; --bronze-bg: #fff3e8; --bronze-b: #f0c898;
  --silver: #6a7a8a; --silver-bg: #eef2f5; --silver-b: #b8c8d8;
  --gold:   #b88000; --gold-bg:   #fffbe8; --gold-b:   #e8c840;
  --plat:   #2a8a8a; --plat-bg:   #e8f7f7; --plat-b:   #70c8c8;
  --diamond:#3a5ac4; --diamond-bg:#edf0ff; --diamond-b:#88a0e8;
  --master: #7a2ab4; --master-bg: #f5eaff; --master-b: #b880e0;

  --skill:  #d04820;
  --growth: #1a8a4a;
  --contrib:#3a5ac4;
  --contin: #b88000;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-text-size-adjust: 100%; }
body {
  height: 100%; background: var(--bg); color: var(--ink);
  font-family: var(--sans); font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased; overflow: hidden;
}

/* ── App shell ── */
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

/* ── Header ── */
.header {
  height: calc(var(--header-h) + var(--safe-top));
  padding-top: var(--safe-top);
  background: var(--white); border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; padding-left: 18px; padding-right: 18px;
  gap: 12px; flex-shrink: 0; position: relative; z-index: 20;
}
.header-logo { display: flex; align-items: center; gap: 8px; }
.header-gem {
  width: 28px; height: 28px; background: transparent;
  display: flex; align-items: center; justify-content: center;
}
.header-title { font-size: 16px; font-weight: 600; color: var(--ink); }
.header-search-btn {
  margin-left: auto; width: 36px; height: 36px; border-radius: 9px;
  background: var(--bg2); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; color: var(--ink3);
}
.header-add-btn {
  width: 36px; height: 36px; border-radius: 9px;
  background: var(--accent); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; color: white;
  font-size: 22px; font-weight: 300; line-height: 1;
  -webkit-tap-highlight-color: transparent;
}
.header-theme-btn {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--bg3); border: 1px solid var(--rule2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink3); font-size: 14px; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}

/* Search bar overlay */
.search-bar {
  display: none; position: absolute; top: 0; left: 0; right: 0;
  height: calc(var(--header-h) + var(--safe-top)); padding-top: var(--safe-top);
  background: var(--white); align-items: center; gap: 10px;
  padding-left: 14px; padding-right: 14px; z-index: 25;
}
.search-bar.on { display: flex; }
.search-bar input {
  flex: 1; background: var(--bg2); border: 1px solid var(--rule);
  border-radius: 10px; padding: 9px 14px; font: 15px var(--sans);
  color: var(--ink); outline: none;
}
.search-cancel { color: var(--accent); font-size: 14px; white-space: nowrap; cursor: pointer; font-weight: 500; }

/* ── Scroll area ── */
.scroll-area {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
}
.scroll-area::-webkit-scrollbar { display: none; }
.page { display: none; padding: 16px 16px 0; }
.page.on { display: block; animation: fup .2s ease; }
@keyframes fup { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

/* ── Bottom nav ── */
.bottom-nav {
  height: calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: var(--white); border-top: 1px solid var(--rule);
  display: flex; align-items: flex-start; flex-shrink: 0; z-index: 20;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; padding: 10px 4px 6px;
  border: none; background: none; cursor: pointer; color: var(--ink4);
  font-size: 10px; font-family: var(--sans); transition: color .13s;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn svg { width: 22px; height: 22px; transition: transform .13s; }
.nav-btn.on { color: var(--ink); }
.nav-btn.on svg { transform: scale(1.1); }
.nav-dot {
  position: relative;
}
.nav-dot::after {
  content: ''; position: absolute; top: -2px; right: -6px;
  width: 7px; height: 7px; background: var(--accent); border-radius: 50%;
  border: 1.5px solid var(--white);
}

/* ── Section header ── */
.sh { display: flex; align-items: baseline; gap: 8px; margin-bottom: 14px; padding-top: 4px; }
.sh-t { font-size: 20px; font-weight: 600; color: var(--ink); }
.sh-c { font-size: 12px; color: var(--ink4); font-family: var(--mono); }

/* ── Rank badge ── */
.rb {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 5px; font-size: 11px;
  font-weight: 600; font-family: var(--mono); border: 1px solid;
}
.rb-bronze  { background:var(--bronze-bg);  color:var(--bronze);  border-color:var(--bronze-b); }
.rb-silver  { background:var(--silver-bg);  color:var(--silver);  border-color:var(--silver-b); }
.rb-gold    { background:var(--gold-bg);    color:var(--gold);    border-color:var(--gold-b); }
.rb-plat    { background:var(--plat-bg);    color:var(--plat);    border-color:var(--plat-b); }
.rb-diamond { background:var(--diamond-bg); color:var(--diamond); border-color:var(--diamond-b); }
.rb-master  { background:var(--master-bg);  color:var(--master);  border-color:var(--master-b); }

/* ── Filter chips ── */
.chips { display: flex; gap: 7px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 2px; -webkit-overflow-scrolling: touch; }
.chips::-webkit-scrollbar { display: none; }
.chip {
  padding: 6px 13px; border-radius: 20px; font-size: 13px; white-space: nowrap;
  border: 1px solid var(--rule2); background: var(--white); color: var(--ink3);
  cursor: pointer; transition: all .13s; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.chip.on { background: var(--accent); border-color: var(--accent); color: white; }

/* ── Avatar ── */
.av {
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-weight: 600; flex-shrink: 0; font-size: 16px;
}
.av-bronze  { background:var(--bronze-bg);  color:var(--bronze); }
.av-silver  { background:var(--silver-bg);  color:var(--silver); }
.av-gold    { background:var(--gold-bg);    color:var(--gold); }
.av-plat    { background:var(--plat-bg);    color:var(--plat); }
.av-diamond { background:var(--diamond-bg); color:var(--diamond); }
.av-master  { background:var(--master-bg);  color:var(--master); }

/* ── Member cards ── */
.mcard {
  background: var(--white); border: 1px solid var(--rule); border-radius: 14px;
  padding: 16px; margin-bottom: 10px; position: relative; overflow: hidden;
  -webkit-tap-highlight-color: transparent; cursor: pointer;
  transition: transform .1s, box-shadow .1s;
  box-shadow: 0 1px 4px rgba(24,22,15,.05);
}
.mcard:active { transform: scale(.985); box-shadow: none; }
.mcard-stripe { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 14px 14px 0 0; }
.mcard-row1 { display: flex; align-items: flex-start; gap: 12px; margin-top: 5px; margin-bottom: 12px; }
.mcard-name { font-size: 15px; font-weight: 600; color: var(--ink); line-height: 1.2; }
.mcard-disc { font-family: var(--mono); font-size: 11.5px; color: var(--ink3); margin-top: 2px; }
.mcard-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
.mtag { font-size: 11px; color: var(--ink3); background: var(--bg); border: 1px solid var(--rule); padding: 3px 8px; border-radius: 5px; }
.eval-row { display: flex; gap: 8px; align-items: center; margin-bottom: 5px; }
.eval-lbl { font-size: 10px; color: var(--ink4); font-family: var(--mono); width: 36px; flex-shrink: 0; }
.eval-pips { display: flex; gap: 2.5px; }
.ep { width: 11px; height: 11px; border-radius: 2.5px; background: var(--bg3); }
.ep-skill  { background: var(--skill); }
.ep-growth { background: var(--growth); }
.ep-contrib{ background: var(--contrib); }
.ep-contin { background: var(--contin); }
.eval-num { font-family: var(--mono); font-size: 11px; font-weight: 600; margin-left: auto; }

/* ── Work cards ── */
.wcard {
  background: var(--white); border: 1px solid var(--rule); border-radius: 14px;
  margin-bottom: 10px; overflow: hidden; cursor: pointer;
  box-shadow: 0 1px 4px rgba(24,22,15,.05);
  -webkit-tap-highlight-color: transparent;
  transition: transform .1s;
}
.wcard:active { transform: scale(.985); }
.wthumb {
  height: 120px; display: flex; align-items: center; justify-content: center;
  font-size: 40px; position: relative;
}
.wt-a { background: linear-gradient(135deg,#f5f0ff,#e4d8ff); }
.wt-b { background: linear-gradient(135deg,#e8f5ff,#c8e4ff); }
.wt-c { background: linear-gradient(135deg,#e8fff5,#c8f0e4); }
.wt-d { background: linear-gradient(135deg,#fff8e8,#fce8a0); }
.wt-e { background: linear-gradient(135deg,#fff0f3,#ffd8e4); }
.wcat { position: absolute; top: 9px; left: 9px; padding: 2px 8px; border-radius: 4px; font-size: 9.5px; font-family: var(--mono); font-weight: 600; }
.wcat-illo   { background:#f0eaff; color:#6030b0; }
.wcat-text   { background:#e8f0ff; color:#2040a0; }
.wcat-doc    { background:#e8fff5; color:#0a7040; }
.wcat-design { background:#fff8e8; color:#905010; }
.wcat-code   { background:#eaf5e8; color:#206020; }
.wcat-video  { background:#fff0f3; color:#901030; }
.wscore {
  position: absolute; top: 9px; right: 9px; width: 34px; height: 34px;
  border-radius: 50%; background: white; display: flex; align-items: center;
  justify-content: center; font-family: var(--mono); font-size: 11.5px; font-weight: 700;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
}
.wbody { padding: 13px; }
.wtitle { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 5px; }
.wmeta { font-size: 11.5px; color: var(--ink3); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
.wfb { font-size: 12px; color: var(--ink2); line-height: 1.5; border-left: 2px solid var(--rule2); padding-left: 8px; font-style: italic; }

/* ── Score color helpers ── */
.sc5 { color: var(--gold); }
.sc4 { color: var(--plat); }
.sc3 { color: var(--diamond); }
.sc2 { color: var(--bronze); }
.sc1 { color: #aa2020; }

/* ── Promo cards ── */
.pcard {
  background: var(--white); border: 1px solid var(--rule); border-radius: 14px;
  padding: 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(24,22,15,.05);
}
.pcard-head { display: flex; align-items: center; gap: 11px; margin-bottom: 14px; }
.verdict {
  margin-left: auto; padding: 3px 10px; border-radius: 5px;
  font-size: 11px; font-family: var(--mono); font-weight: 600; border: 1px solid;
}
.vok   { background:var(--plat-bg);    color:var(--plat);    border-color:var(--plat-b); }
.vgo   { background:var(--diamond-bg); color:var(--diamond); border-color:var(--diamond-b); }
.vhold { background:var(--bronze-bg);  color:var(--bronze);  border-color:var(--bronze-b); }
.vtop  { background:var(--master-bg);  color:var(--master);  border-color:var(--master-b); }
.prg { display: flex; flex-direction: column; gap: 8px; }
.prg-row { display: flex; flex-direction: column; gap: 4px; }
.prg-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--ink3); }
.prg-val { font-family: var(--mono); font-size: 12px; font-weight: 600; }
.prg-track { height: 5px; background: var(--bg2); border-radius: 3px; overflow: hidden; }
.prg-bar { height: 100%; border-radius: 3px; transition: width .5s cubic-bezier(.4,0,.2,1); }

/* ── App table ── */
.acard {
  background: var(--white); border: 1px solid var(--rule); border-radius: 14px;
  padding: 15px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(24,22,15,.05);
}
.acard-row1 { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.acard-name { font-size: 15px; font-weight: 600; color: var(--ink); }
.acard-disc { font-family: var(--mono); font-size: 12px; color: var(--diamond); margin-top: 1px; }
.acard-info { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.ainfo { font-size: 11.5px; color: var(--ink3); background: var(--bg); border: 1px solid var(--rule); padding: 3px 8px; border-radius: 5px; }
.acard-actions { display: flex; gap: 8px; align-items: center; }
.status-select {
  flex: 1; padding: 8px 10px; border-radius: 9px; border: 1px solid var(--rule2);
  background: var(--bg); font: 13px var(--sans); color: var(--ink); outline: none;
  -webkit-appearance: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%238a8780' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 10px center; background-size: 10px;
  padding-right: 30px;
}
.sp { display: inline-flex; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-family: var(--mono); font-weight: 600; white-space: nowrap; }
.sp-review   { background:var(--diamond-bg); color:var(--diamond); border:1px solid var(--diamond-b); }
.sp-pending  { background:var(--gold-bg);    color:var(--gold);    border:1px solid var(--gold-b); }
.sp-approved { background:var(--plat-bg);    color:var(--plat);    border:1px solid var(--plat-b); }
.sp-rejected { background:var(--bronze-bg);  color:var(--bronze);  border:1px solid var(--bronze-b); }

/* ── Dashboard stats ── */
.dash-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; margin-bottom: 18px; }
.stat {
  background: var(--white); border: 1px solid var(--rule); border-radius: 12px;
  padding: 12px; box-shadow: 0 1px 4px rgba(24,22,15,.04);
}
.stat-lbl { font-size: 9.5px; color: var(--ink4); letter-spacing:.06em; text-transform:uppercase; font-family:var(--mono); margin-bottom:6px; }
.stat-val { font-size: 26px; font-weight: 700; line-height: 1; font-family: var(--mono); }
.stat-sub { font-size: 10.5px; color: var(--ink3); margin-top: 3px; }
.stat-blue    .stat-val { color: var(--diamond); }
.stat-gold    .stat-val { color: var(--gold); }
.stat-teal    .stat-val { color: var(--plat); }

.dash-rank-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 18px; }
.rank-tile {
  background: var(--white); border: 1px solid var(--rule); border-radius: 11px;
  padding: 10px; text-align: center; box-shadow: 0 1px 4px rgba(24,22,15,.04);
}
.rank-tile-icon { font-size: 18px; margin-bottom: 2px; }
.rank-tile-label { font-size: 10px; font-weight: 600; margin-bottom: 2px; }
.rank-tile-count { font-size: 20px; font-weight: 700; font-family: var(--mono); line-height: 1; }

.recent-list { background: var(--white); border: 1px solid var(--rule); border-radius: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(24,22,15,.04); }
.ri {
  display: flex; align-items: center; gap: 11px; padding: 12px 14px;
  border-bottom: 1px solid var(--rule); cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.ri:last-child { border-bottom: none; }
.ri:active { background: var(--bg); }
.ri-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.ri-info { flex: 1; min-width: 0; }
.ri-title { font-size: 13.5px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ri-sub   { font-size: 11px; color: var(--ink3); margin-top: 1px; }

/* ── Sheet (bottom modal) ── */
.sheet-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35);
  z-index: 100; align-items: flex-end;
}
.sheet-overlay.on { display: flex; animation: fadeIn .18s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.sheet {
  width: 100%; background: var(--white);
  border-radius: 20px 20px 0 0;
  padding-bottom: calc(var(--safe-bottom) + 20px);
  max-height: 92dvh; overflow-y: auto;
  animation: slideUp .22s cubic-bezier(.32,0,.67,0);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sheet-handle {
  width: 36px; height: 4px; background: var(--rule2); border-radius: 2px;
  margin: 12px auto 16px;
}
.sheet-head { padding: 0 20px 14px; border-bottom: 1px solid var(--rule); margin-bottom: 16px; }
.sheet-title { font-size: 17px; font-weight: 600; color: var(--ink); }
.sheet-sub   { font-size: 12.5px; color: var(--ink3); margin-top: 2px; }
.sheet-body  { padding: 0 20px; }

/* ── Form elements ── */
.field { margin-bottom: 16px; }
.field-label { font-size: 11.5px; color: var(--ink3); font-family: var(--mono); margin-bottom: 6px; display: block; }
.finput {
  width: 100%; background: var(--bg); border: 1px solid var(--rule2);
  border-radius: 10px; padding: 11px 14px; font: 15px var(--sans);
  color: var(--ink); outline: none; transition: border .13s;
  -webkit-appearance: none;
}
.finput:focus { border-color: var(--ink3); background: var(--white); }
textarea.finput { resize: none; min-height: 80px; }
.search-input {
  width: 100%; background: var(--bg2); border: 1px solid var(--rule2);
  border-radius: 10px; padding: 10px 14px; font: 15px var(--sans);
  color: var(--ink); outline: none; box-sizing: border-box;
  -webkit-appearance: none; appearance: none;
}
.search-input:focus { border-color: var(--ink3); }
select.finput {
  -webkit-appearance: none; cursor: pointer;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%238a8780' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 12px center; background-size: 10px;
  padding-right: 36px;
}
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Eval stars */
.eval-section { background: var(--bg); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.eval-section-label { font-size: 11.5px; font-weight: 600; font-family: var(--mono); margin-bottom: 5px; }
.eval-section-desc  { font-size: 11px; color: var(--ink3); margin-bottom: 10px; line-height: 1.4; }
.eval-stars { display: flex; gap: 7px; margin-bottom: 5px; }
.estar {
  flex: 1; height: 36px; border-radius: 8px; border: none; cursor: pointer;
  font-size: 14px; font-weight: 700; font-family: var(--mono);
  background: var(--bg3); color: var(--ink3);
  transition: all .13s; -webkit-tap-highlight-color: transparent;
}
.estar.on { color: white; }
.eval-desc-text { font-size: 11px; color: var(--ink3); min-height: 16px; }

/* ── Buttons ── */
.btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 13px; border-radius: 12px; border: none; cursor: pointer;
  font: 15px var(--sans); font-weight: 500; transition: all .13s;
  -webkit-tap-highlight-color: transparent;
}
.btn-solid  { background: var(--accent); color: white; }
.btn-solid:active  { background: #a00020; }
.btn-ghost  { background: transparent; color: var(--ink2); border: 1px solid var(--rule2); }
.btn-ghost:active  { background: var(--bg2); }
.btn-row { display: flex; gap: 10px; margin-top: 6px; }
.btn-row .btn { flex: 1; }

/* ── Member detail sheet ── */
.mdl-section-title {
  font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink4); font-family: var(--mono); margin-bottom: 10px;
  padding-bottom: 6px; border-bottom: 1px solid var(--rule);
}
.eval-big-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.eb { background: var(--bg); border-radius: 10px; padding: 12px; }
.eb-label { font-size: 10px; font-family: var(--mono); font-weight: 700; margin-bottom: 6px; }
.eb-pips  { display: flex; gap: 3px; margin-bottom: 4px; }
.eb-pip   { width: 14px; height: 14px; border-radius: 3px; background: var(--bg3); }
.eb-num   { font-family: var(--mono); font-size: 20px; font-weight: 700; line-height: 1; }
.eb-desc  { font-size: 10.5px; color: var(--ink3); margin-top: 2px; }
.wt-item {
  display: flex; align-items: flex-start; gap: 10px; padding: 11px;
  background: var(--bg); border-radius: 10px; margin-bottom: 7px; cursor: pointer;
}
.wt-item:active { background: var(--bg2); }
.wt-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.next-rank-box { background: var(--bg); border-radius: 10px; padding: 12px; margin-top: 12px; }


/* ── Memo field ── */
.memo-box {
  background: var(--bg2); border: 1px solid var(--gold-b, var(--gold-b));
  border-radius: 10px; padding: 10px 12px; margin-bottom: 10px;
  font-size: 12.5px; color: var(--ink2); line-height: 1.6;
  white-space: pre-wrap; word-break: break-all; min-height: 40px;
}
.memo-empty { color: var(--ink4); font-style: italic; }

/* ── Weekly badge on member card ── */
.weekly-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 20px; font-size: 11px;
  font-family: var(--mono); font-weight: 600;
  background: var(--accent-bg); color: var(--accent);
  border: 1px solid var(--accent-b);
}
.weekly-badge-inactive {
  background: var(--bg3); color: var(--ink4); border-color: var(--rule2);
}

/* ── Install banner ── */
.install-banner {
  display: none; background: var(--diamond-bg); border: 1px solid var(--diamond-b);
  border-radius: 12px; padding: 12px 14px; margin: 0 16px 12px;
  align-items: center; gap: 10px;
}
.install-banner.on { display: flex; }
.install-banner-text { flex: 1; font-size: 12.5px; color: var(--diamond); }
.install-banner-btn {
  padding: 6px 12px; border-radius: 8px; background: var(--diamond);
  color: white; border: none; font: 12px var(--sans); cursor: pointer; font-weight: 500; white-space: nowrap;
}
.install-banner-close { color: var(--ink4); font-size: 18px; cursor: pointer; line-height: 1; }
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-logo" style="display:flex;align-items:center">
      <span style="font-size:18px;font-weight:700;color:var(--ink);letter-spacing:.03em">Flatland</span>
    </div>
    <span class="header-title" id="hdr-title" style="display:none">Dashboard</span>
    <div style="margin-left:auto;display:flex;gap:7px;align-items:center">
      <button class="header-theme-btn" onclick="toggleTheme()" id="theme-btn">☀️</button>
      <button class="header-add-btn" onclick="openSheet('sheet-addmember')">+</button>
    </div>
  </div>

  <!-- Install banner -->
  <div class="install-banner" id="install-banner">
    <span class="install-banner-text">ホーム画面に追加するとアプリのように使えます</span>
    <button class="install-banner-btn" id="install-btn">追加</button>
    <span class="install-banner-close" onclick="document.getElementById('install-banner').classList.remove('on')">×</span>
  </div>

  <!-- Pages -->
  <div class="scroll-area">

    <!-- Dashboard -->
    <div class="page on" id="page-dashboard">
      <div class="dash-stats">
        <div class="stat stat-blue" onclick="nav('members',document.getElementById('nav-members'));filterM('all',document.querySelector('#member-chips .chip'))" style="cursor:pointer"><div class="stat-lbl">メンバー</div><div class="stat-val" id="ds-members">6</div><div class="stat-sub">アクティブ</div></div>
        <div class="stat stat-gold" onclick="nav('gallery',document.getElementById('nav-gallery'))" style="cursor:pointer"><div class="stat-lbl">作品</div><div class="stat-val" id="ds-works">9</div><div class="stat-sub">総作品数</div></div>
        <div class="stat stat-teal" onclick="nav('applications',document.getElementById('nav-applications'))" style="cursor:pointer"><div class="stat-lbl">申請</div><div class="stat-val" id="ds-apps">2</div><div class="stat-sub">審査待ち</div></div>
      </div>
      <div class="dash-rank-row" id="dash-rank-row"></div>
      <div class="sh"><span class="sh-t">今週の活動</span></div>
      <div id="dash-weekly"></div>
      <div class="sh"><span class="sh-t">最近の作品</span></div>
      <div class="recent-list" id="dash-recent"></div>
    </div>

    <!-- Members -->
    <div class="page" id="page-members">
      <div class="sh"><span class="sh-t">メンバー</span><span class="sh-c" id="m-cnt"></span></div>
      <div style="padding:0 0 10px">
        <input id="member-search" class="search-input" placeholder="名前・Discord名で検索…"
          oninput="renderMembers()"
          onkeyup="renderMembers()"
          style="width:100%">
      </div>
      <div class="chips" id="member-chips">
        <button class="chip on" onclick="filterM('all',this)">すべて</button>
        <button class="chip" onclick="filterM('bronze',this)">🥉 ブロンズ</button>
        <button class="chip" onclick="filterM('silver',this)">🥈 シルバー</button>
        <button class="chip" onclick="filterM('gold',this)">🥇 ゴールド</button>
        <button class="chip" onclick="filterM('plat',this)">💠 プラチナ</button>
        <button class="chip" onclick="filterM('diamond',this)">💎 ダイヤモンド</button>
        <button class="chip" onclick="filterM('master',this)">👑 マスター</button>
      </div>
      <div id="member-list"></div>
    </div>

<script>
// ── Data ───────────────────────────────────────────────────────
const RANKS = {
  bronze: {label:'ブロンズ',  icon:'🥉',color:'#b46a2a',bg:'#fff3e8',border:'#f0c898'},
  silver: {label:'シルバー',  icon:'🥈',color:'#6a7a8a',bg:'#eef2f5',border:'#b8c8d8'},

  diamond:{label:'ダイヤモンド',icon:'💎',color:'#3a5ac4',bg:'#edf0ff',border:'#88a0e8'},
  master: {label:'マスター',  icon:'👑',color:'#7a2ab4',bg:'#f5eaff',border:'#b880e0'},
};
const RANK_ORDER = ['bronze','silver','gold','plat','diamond','master'];

const EVAL_AXES = [
  {key:'skill',  label:'作品の質',  color:'#d04820',descs:['低い','粗い','普通','高い','プロレベル']},
  {key:'growth', label:'成長速度',  color:'#1a8a4a',descs:['変化なし','少し成長','普通','明確に成長','爆発的']},
  {key:'contrib',label:'貢献度',    color:'#3a5ac4',descs:['何もなし','たまに反応','投稿あり','レビュー活発','コミュニティを動かす']},
  {key:'contin', label:'継続性',    color:'#b88000',descs:['ほぼなし','不定期','週1','週2〜3','ほぼ毎日']},
];

const RANK_NEXT_REQS = {
  silver:  {},
  gold:    {skill:2,growth:2,contin:2},
  plat:    {skill:3,growth:3,contin:3},
  diamond: {skill:3,growth:3,contrib:3,contin:4},
  master:  {skill:4,growth:4,contrib:4,contin:4},
};
const RANK_NEXT_CONDS = {
  silver:  ['発言 or リアクション','参加意思の表明'],
  gold:    ['トレーニングの完了','作品1つ以上投稿'],
  plat:    ['クエスト参加','WIP投稿あり'],
  diamond: ['上級クエストの提出'],
  master:  ['デモリールの完成','他メンバーへの貢献あり'],
};

let MEMBERS = [];
let WORKS = [];
let APPS = [];
let WEEKLY = [];


// ── GAS 連携設定 ───────────────────────────────────────────────
const GAS_URL = 'https://script.google.com/a/macros/cai.tokyo/s/AKfycbzrpAH4ytPQh58UAfGkHg4vKtU-cowed3ml3s-pkwQEmIDSXUi5sK15pKho6mwjCice/exec';

async function gasGet(action) {
  try {
    const res = await fetch(`${GAS_URL}?action=${action}`, {
      method: 'GET',
      mode: 'cors',
    });
    return await res.json();
  } catch(e) {
    console.warn('GAS GET失敗:', e);
    return null;
  }
}

async function gasPost(data) {
  try {
    // GASはapplication/jsonをPOSTで受け取れないためフォームエンコードで送る
    const params = new URLSearchParams();
    params.append('payload', JSON.stringify(data));
    const res = await fetch(GAS_URL, {
      method: 'POST',
      mode: 'cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString(),
    });
    return await res.json();
  } catch(e) {
    console.warn('GAS POST失敗:', e);
    return null;
  }
}


let mFilter='all', gFilter='all', folderFilter='all', aFilter='all', promoFilter='all', promoRankFilter='all';
let evalScores={skill:1,growth:1,contrib:1,contin:1}, evalTargetId=null;
const PAGE_TITLES = {dashboard:'ホーム',members:'メンバー',gallery:'作品',promotion:'昇格審査',applications:'申請'};

// ── Helpers ────────────────────────────────────────────────────
function scColor(s){return s>=90?'#b88000':s>=80?'#2a8a8a':s>=70?'#3a5ac4':s>=60?'#b46a2a':'#aa2020';}
function scClass(s){return s>=90?'sc5':s>=80?'sc4':s>=70?'sc3':s>=60?'sc2':'sc1';}
function nextRank(r){const i=RANK_ORDER.indexOf(r);return i>=0&&i<5?RANK_ORDER[i+1]:null;}
function memberWorks(mId){return WORKS.filter(w=>w.mId===mId).sort((a,b)=>b.id.localeCompare(a.id));}
function pips(val,key,size=11){
  return [1,2,3,4,5].map(i=>`<div class="ep${i<=val?' ep-'+key:''}" style="width:${size}px;height:${size}px"></div>`).join('');
}
function rankBadge(r){const R=RANKS[r];return `<span class="rb rb-${r}">${R.icon} ${R.label}</span>`;}

// ── ランク名正規化（日本語→英語キー）──────────────────────────
const RANK_JA_TO_EN = {
  'ブロンズ':'bronze','bronze':'bronze',
  'シルバー':'silver','silver':'silver',
  'ゴールド':'gold',  'gold':'gold',
  'プラチナ':'plat',  'plat':'plat',
  'ダイヤモンド':'diamond','diamond':'diamond',
  'マスター':'master','master':'master',
};
function normalizeRank(r){ return RANK_JA_TO_EN[r] || 'bronze'; }

// 英語ランクキー→日本語（スプレッドシート保存用）
const RANK_EN_TO_JA = {
  'bronze':'ブロンズ','silver':'シルバー','gold':'ゴールド',
  'plat':'プラチナ','diamond':'ダイヤモンド','master':'マスター',
};
function rankToJa(r){ return RANK_EN_TO_JA[r] || RANK_EN_TO_JA[normalizeRank(r)] || r; }

// ── フォルダ名正規化（英語混在→日本語に統一） ─────────────────
const FOLDER_NORM = {
  'training':'トレーニング','トレーニング':'トレーニング',
  'quest':'クエスト',       'クエスト':'クエスト',
  'raid':'レイド',          'レイド':'レイド',
  'gallery':'ギャラリー',   'ギャラリー':'ギャラリー',
};
function normalizeFolder(f){ return FOLDER_NORM[f] || 'ギャラリー'; }

// ── 検索正規化（ひらがな↔カタカナ・全角↔半角・小文字統一）──────
function normalizeQ(str) {
  if(!str) return '';
  return str
    .toLowerCase()
    // 全角英数→半角
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
    // カタカナ→ひらがな
    .replace(/[\u30A1-\u30F6]/g, s => String.fromCharCode(s.charCodeAt(0) - 0x60))
    // 全角・半角スペース除去
    .replace(/[\s\u3000]+/g, '')
    // 長音符はそのまま許容
    .trim();
}
function matchQ(q, ...targets) {
  const nq = normalizeQ(q);
  if(!nq) return true;
  // スペース区切りで複数キーワードAND検索
  const keywords = q.trim().split(/[\s\u3000]+/).map(normalizeQ).filter(Boolean);
  if (keywords.length === 0) return true;
  const normTargets = targets.map(normalizeQ);
  return keywords.every(kw => normTargets.some(t => t.includes(kw)));
}

// ── 50音順ソート用ヘルパー ────────────────────────────────────
function sortKey(str) {
  if (!str) return '';
  // カタカナ→ひらがな、全角英数→半角、大文字→小文字
  return String(str)
    .toLowerCase()
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
    .replace(/[\u30A1-\u30F6]/g, s => String.fromCharCode(s.charCodeAt(0) - 0x60))
    .replace(/[\s\u3000]+/g, '');
}
function sortByName(arr, getName) {
  return [...arr].sort((a, b) => {
    const ka = sortKey(getName(a));
    const kb = sortKey(getName(b));
    return ka.localeCompare(kb, 'ja');
  });
}

function renderDash(){

// ── 週次活動レポート ───────────────────────────────────────────
function renderWeekly(){
  const el = document.getElementById('dash-weekly');
  if (!el) return;

  if (!WEEKLY || WEEKLY.length === 0) {
    el.innerHTML = `<div style="padding:16px;color:var(--ink3);font-size:13px;text-align:center">データがまだありません</div>`;
    return;
  }

  // 最新の週を特定
  const latestWeek = WEEKLY.reduce((max, w) => {
    return (!max || w.weekStart > max) ? w.weekStart : max;
  }, null);

  // 同じuserIdで重複がある場合は統合（複数行の合算）
  const merged = {};
  WEEKLY.filter(w => w.weekStart === latestWeek).forEach(w => {
    const id = String(w.userId);
    if (!merged[id]) {
      merged[id] = { ...w };
    } else {
      merged[id].totalMessages    += (w.totalMessages || 0);
      merged[id].totalAttachments += (w.totalAttachments || 0);
    }
  });
  const thisWeek = Object.values(merged);

  const active = thisWeek.filter(w => (w.totalMessages || 0) > 0)
    .sort((a,b) => (b.totalMessages||0) - (a.totalMessages||0));
  const totalMsg = active.reduce((s,w) => s + (w.totalMessages||0), 0);
  const totalAtt = active.reduce((s,w) => s + (w.totalAttachments||0), 0);

  // Discord名（disc）→メンバーIDマップ
  const discToMember = {};
  MEMBERS.forEach(m => {
    if (m.disc) discToMember[String(m.disc).toLowerCase()] = m.id;
  });

  // アクティブなメンバーのID集合（username照合）
  const activeNames = new Set(active.map(w => String(w.username || '').toLowerCase()));
  const activeMemberIds = new Set();
  active.forEach(w => {
    // usernameからメンバーIDを特定
    const uname = String(w.username || '').toLowerCase();
    if (discToMember[uname]) activeMemberIds.add(discToMember[uname]);
    // 名前一致も試す（username ≠ disc の場合もあるため）
    MEMBERS.forEach(m => {
      if (m.name && w.username && m.name.includes(w.username)) activeMemberIds.add(m.id);
      if (m.name && w.username && w.username.includes(m.name)) activeMemberIds.add(m.id);
    });
  });

  // 非アクティブメンバー（50音順）
  const inactive = sortByName(
    MEMBERS.filter(m => m.status === 'アクティブ' && !activeMemberIds.has(m.id)),
    m => m.name
  );

  // 週の期間を整形
  const ws = new Date(latestWeek);
  const we = new Date(ws); we.setDate(we.getDate() + 6);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  const range = `${fmt(ws)}〜${fmt(we)}`;

  // ランキング（初期は5位まで、展開で全件）
  const renderRankItem = (w, i) => {
    const rank = `${i+1}.`;
    // メンバーIDを特定（username → disc の両方で試す）
    const uname = String(w.username || '').toLowerCase();
    let mId = discToMember[uname];
    if (!mId) {
      const matched = MEMBERS.find(m =>
        (m.name && w.username && (m.name.includes(w.username) || w.username.includes(m.name)))
      );
      if (matched) mId = matched.id;
    }
    const clickable = mId ? `onclick="openEvalSheet('${mId}')" style="cursor:pointer"` : '';
    return `<div class="ri" ${clickable}>
      <div class="ri-info">
        <div class="ri-title">${rank} ${w.username}</div>
        <div class="ri-sub">メッセージ ${w.totalMessages||0}件 · 添付 ${w.totalAttachments||0}件</div>
      </div>
    </div>`;
  };

  const top5 = active.slice(0, 5).map((w, i) => renderRankItem(w, i)).join('');
  const rest = active.slice(5).map((w, i) => renderRankItem(w, i + 5)).join('');

  el.innerHTML = `
    <div style="padding:12px 14px;background:var(--bg2);border-radius:10px;margin-bottom:10px;font-size:13px;color:var(--ink2)">
      <span style="color:var(--ink3)">${range}</span> · アクティブ <b style="color:var(--ink1)">${active.length}人</b> · メッセージ <b style="color:var(--ink1)">${totalMsg}</b>件 · 添付 <b style="color:var(--ink1)">${totalAtt}</b>件
    </div>
    <div class="recent-list" id="dash-weekly-top5">${top5 || '<div style="padding:12px;color:var(--ink3);font-size:13px;text-align:center">アクティブなメンバーがいません</div>'}</div>
    <div class="recent-list" id="dash-weekly-rest" style="display:none">${rest}</div>
    ${active.length > 5 ? `
      <button id="dash-weekly-toggle" onclick="toggleWeeklyRanking(this)"
        data-count="${active.length - 5}"
        style="width:100%;margin-top:8px;padding:10px;border-radius:9px;background:var(--bg2);border:1px solid var(--rule2);color:var(--ink2);font:13px var(--sans);cursor:pointer">
        ▼ 残り ${active.length - 5} 人を表示
      </button>
    ` : ''}
    ${inactive.length > 0 ? `
      <div style="margin-top:12px;padding:12px 14px;background:var(--bg2);border-radius:10px;font-size:13px;color:var(--ink2)">
        <div onclick="toggleWeeklyInactive(this)" style="color:var(--ink3);display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none">
          <span>非アクティブ（${inactive.length}人）</span>
          <span id="dash-weekly-inactive-arrow" style="font-size:11px">▼</span>
        </div>
        <div id="dash-weekly-inactive-list" style="display:none;margin-top:8px;color:var(--ink1);line-height:1.9">
          ${inactive.map(m => `<span onclick="openEvalSheet('${m.id}')" style="display:inline-block;padding:3px 10px;margin:2px 3px;background:var(--bg);border:1px solid var(--rule2);border-radius:12px;font-size:12px;cursor:pointer">${m.name}</span>`).join('')}
        </div>
      </div>
    ` : ''}
  `;
}

// ── 週次ランキングの折り畳み ───────────────────────────────────
function getThisWeekData(disc) {
  if (!WEEKLY || WEEKLY.length === 0) return null;
  const latestWeek = WEEKLY.reduce((max, w) => (!max || w.weekStart > max) ? w.weekStart : max, null);
  const uname = String(disc || '').toLowerCase();
  const rows = WEEKLY.filter(w => w.weekStart === latestWeek &&
    (String(w.username||'').toLowerCase() === uname || String(w.userId||'') === uname));
  if (!rows.length) return null;
  return rows.reduce((acc, r) => {
    acc.totalMessages    += r.totalMessages || 0;
    acc.totalAttachments += r.totalAttachments || 0;
    return acc;
  }, { totalMessages: 0, totalAttachments: 0 });
}

function toggleWeeklyRanking(btn){

  btn.textContent = expanded
    ? `▼ 残り ${count} 人を表示`
    : `▲ 折りたたむ`;
}

}

  const chips = document.querySelectorAll('#member-chips .chip');
  const rankLabels = {all:'すべて', bronze:'ブロンズ', silver:'シルバー', gold:'ゴールド', plat:'プラチナ', diamond:'ダイヤモンド', master:'マスター'};
  const label = rankLabels[rank];
  chips.forEach(c => {
    if (c.textContent.includes(label)) {
      filterM(rank, c);
    }
  });
  // 検索欄もクリア
  const s = document.getElementById('member-search');
  if (s) s.value = '';
  renderMembers();
}

function openEditMember(mId){

  document.getElementById('edit-target-label').textContent = m.name;
  document.getElementById('edit-name').value   = m.name   || '';
  document.getElementById('edit-disc').value   = m.disc   || '';
  document.getElementById('edit-email').value  = m.email  || '';

  document.getElementById('edit-memo').value   = m.memo   || '';

  // 入学媒体

  mediaEl.value = mediaOpts.includes(m.media) ? m.media : 'その他';

  document.getElementById('edit-rank').value   = normalizeRank(m.rank);

  // ステータス

function submitEditMember(){
  const mId = document.getElementById('sheet-edit').dataset.mId;
  const m = MEMBERS.find(x=>x.id===mId); if(!m) return;

  const newRank   = document.getElementById('edit-rank').value;
  const newStatus = document.getElementById('edit-status').value;

  // ローカル更新
  m.name   = document.getElementById('edit-name').value.trim()   || m.name;
  m.disc   = document.getElementById('edit-disc').value.trim()   || m.disc;
  m.email  = document.getElementById('edit-email').value.trim();
  m.media  = document.getElementById('edit-media').value;
  m.resume = document.getElementById('edit-resume').value.trim();
  m.memo   = document.getElementById('edit-memo').value.trim();
  m.rank   = newRank;
  m.status = newStatus;

  closeSheet('sheet-edit');

  // GASに保存
  gasPost({
    action:  'updateMember',
    id:      mId,
    name:    m.name,
    disc:    m.disc,
    email:   m.email,
    media:   m.media,
    resume:  m.resume,
    memo:    m.memo,
    rank:    rankToJa(newRank),
    status:  newStatus,
  }).catch(()=>console.warn('編集の保存に失敗'));

  renderDash();
  if(document.getElementById('page-members').classList.contains('on'))    renderMembers();
  if(document.getElementById('page-promotion').classList.contains('on'))  renderPromo();
}


function setRank(mId, newRank) {
  const m = MEMBERS.find(x=>x.id===mId); if(!m) return;
  if(m.rank === newRank) return;
  const R = RANKS[newRank];
  if(!confirm(`${m.name} のランクを\n${RANKS[m.rank].icon} ${RANKS[m.rank].label} → ${R.icon} ${R.label}\nに変更しますか？`)) return;
  m.rank = newRank;
  gasPost({ action:'updateMember', id:m.id, rank:rankToJa(newRank) })
    .catch(()=>console.warn('ランク保存失敗'));
  renderDash();
  if(document.getElementById('page-members').classList.contains('on')) renderMembers();
  if(document.getElementById('page-promotion').classList.contains('on')) renderPromo();
  closeSheet('sheet-member');
}


function deleteMember(id, name) {
  if(!confirm(`${name} を削除しますか？\nこの操作は取り消せません。`)) return;
  MEMBERS = MEMBERS.filter(m => m.id !== id);
  renderMembers();
  renderDash();
  // GASに非同期削除
  gasPost({ action:'deleteMember', id })
    .catch(() => alert('削除の保存に失敗しました。再度お試しください。'));
}

function filterM(f,el){
  mFilter=f;

function renderMemberWeekly(m){
  if (!WEEKLY || WEEKLY.length === 0) return '';

  // このメンバーの最新週データを探す
  const myData = WEEKLY.filter(w => String(w.userId) === String(m.disc));
  if (myData.length === 0) {
    return `<div style="margin-bottom:16px">
      <div class="mdl-section-title">今週の活動</div>
      <div style="color:var(--ink4);font-size:12px;padding:8px 0">活動データがありません</div>
    </div>`;
  }

  // 最新週を取得
  const latestWeek = myData.reduce((max, w) => (!max || w.weekStart > max) ? w.weekStart : max, null);
  const latest = myData.find(w => w.weekStart === latestWeek);
  if (!latest) return '';

  const channels = [
    { key: '制作相談', icon: '💡' },
    { key: 'トレーニング提出', icon: '📚' },
    { key: 'クエスト提出', icon: '⚔️' },
    { key: '作品ギャラリー', icon: '🎨' },
    { key: '成果共有', icon: '🏆' },
    { key: '雑談', icon: '💬' },
    { key: 'インスピレーション', icon: '✨' },
    { key: 'ゲームトーク', icon: '🎮' },
    { key: 'レイド募集', icon: '🛡' },
  ];

  const ws = new Date(latestWeek);
  const we = new Date(ws); we.setDate(we.getDate() + 6);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;

  return `<div style="margin-bottom:16px">
    <div class="mdl-section-title">今週の活動 <span style="font-weight:400;color:var(--ink4);font-size:11px">${fmt(ws)}〜${fmt(we)}</span></div>
    <div style="padding:12px 14px;background:var(--bg2);border-radius:10px;margin-bottom:10px;font-size:13px;color:var(--ink2)">
      メッセージ <b style="color:var(--ink1)">${latest.totalMessages||0}</b>件 · 添付 <b style="color:var(--ink1)">${latest.totalAttachments||0}</b>件
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
      ${channels.map(c => {
        const v = latest[c.key] || 0;
        return `<div style="padding:8px 10px;background:${v>0?'var(--diamond-bg)':'var(--bg2)'};border-radius:8px;border:1px solid ${v>0?'var(--diamond-b)':'var(--rule2)'}">
          <div style="font-size:10.5px;color:var(--ink3);margin-bottom:2px">${c.icon} ${c.key}</div>
          <div style="font-size:15px;font-weight:600;color:${v>0?'var(--diamond)':'var(--ink4)'};font-family:var(--mono)">${v}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── Promotion ──────────────────────────────────────────────────
function renderPromo(){
  const container = document.getElementById('promo-list');
  const searchEl = document.getElementById('promo-search');
  const q = searchEl ? searchEl.value.trim() : '';

  let html = '';

  RANK_ORDER.forEach(rank => {
    // ランクフィルター
    if(promoRankFilter !== 'all' && promoRankFilter !== rank) return;

    const R = RANKS[rank];
    const nr = nextRank(rank);
    const NR = nr ? RANKS[nr] : null;
    const reqs = nr ? RANK_NEXT_REQS[nr] || {} : {};
    const conds = nr ? RANK_NEXT_CONDS[nr] || [] : [];

    // メンバー絞り込み（検索 + ステータスフィルター）
    let members = MEMBERS.filter(m => m.rank === rank);
    if(q) members = members.filter(m => matchQ(q, m.name, m.disc));
    if(promoFilter !== 'all') {
      members = members.filter(m => {
        const allMet = nr && Object.entries(reqs).every(([k,v])=>m.eval[k]>=v) && conds.every(c=>m.conds&&m.conds[c]);
        const someMet = nr && (Object.entries(reqs).some(([k,v])=>m.eval[k]>=v-1)||conds.some(c=>m.conds&&m.conds[c]));
        if(promoFilter==='ok')   return allMet;
        if(promoFilter==='go')   return !allMet && someMet;
        if(promoFilter==='hold') return !allMet && !someMet && !!nr;
        return true;
      });
    }
    members = sortByName(members, m => m.name);
    if (!members.length) return;

    // セクションヘッダー
    html += `
      <div style="display:flex;align-items:center;gap:8px;margin:18px 0 10px;padding-bottom:8px;border-bottom:2px solid ${R.color}20">
        <span style="font-size:20px">${R.icon}</span>
        <span style="font-size:15px;font-weight:600;color:${R.color}">${R.label}</span>
        ${NR ? `<span style="font-size:12px;color:var(--ink4);font-family:var(--mono)">→ ${NR.icon} ${NR.label} へ</span>` : ''}
        <span style="margin-left:auto;font-size:11px;color:var(--ink4);font-family:var(--mono)">${members.length}人</span>
      </div>`;

    // 昇格条件サマリー（ランクごとに1回だけ表示）
    if (nr) {
      html += `<div style="background:${R.color}08;border:1px solid ${R.color}30;border-radius:10px;padding:11px 13px;margin-bottom:10px">
        <div style="font-size:10px;font-family:var(--mono);font-weight:600;color:${R.color};margin-bottom:7px;letter-spacing:.06em">昇格条件</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:${conds.length?'7px':'0'}">
          ${EVAL_AXES.map(ax => {
            const req = reqs[ax.key] || 0;
            if (!req) return '';
            return `<span style="font-size:11px;padding:3px 9px;border-radius:5px;background:white;border:1px solid ${ax.color}40;color:${ax.color};font-family:var(--mono);font-weight:600">${ax.label} ${req}以上</span>`;
          }).join('')}
        </div>
        ${conds.length ? `<div style="display:flex;flex-wrap:wrap;gap:5px">${conds.map(c => `<span style="font-size:11px;padding:3px 9px;border-radius:5px;background:white;border:1px solid var(--rule2);color:var(--ink3)">${c}</span>`).join('')}</div>` : ''}
      </div>`;
    }

    // メンバーカード
    members.forEach(m => {
      const allMet = nr && Object.entries(reqs).every(([k,v]) => m.eval[k] >= v) && conds.every(c => m.conds && m.conds[c]);
      const someMet = nr && (Object.entries(reqs).some(([k,v]) => m.eval[k] >= v-1) || conds.some(c => m.conds && m.conds[c]));
      const v = !nr ? {l:'👑 マスター',c:'vtop'} : allMet ? {l:'✦ 昇格可能',c:'vok'} : someMet ? {l:'→ 継続中',c:'vgo'} : {l:'⏸ 要強化',c:'vhold'};

      html += `<div class="pcard" style="border-left:3px solid ${R.color};border-top:none;border-radius:11px;margin-bottom:8px">
        <div class="pcard-head" style="margin-bottom:10px">
          <div class="av av-${rank}" style="width:34px;height:34px;font-size:14px">${m.name[0]}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.name}</div>
            <div style="font-size:11px;color:var(--ink3);font-family:var(--mono)">${m.disc}</div>
          </div>
          <span class="verdict ${v.c}">${v.l}</span>
        </div>

        ${nr ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
          ${EVAL_AXES.map(ax => {
            const req = reqs[ax.key] || 0;
            if (!req) return '';
            const cur = m.eval[ax.key];
            const ok = cur >= req;
            const pct = Math.min(cur / req * 100, 100);
            return `<div style="background:${ok ? ax.color+'10' : 'var(--bg)'};border:1px solid ${ok ? ax.color+'40' : 'var(--rule)'};border-radius:8px;padding:8px 10px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                <span style="font-size:10px;color:${ok ? ax.color : 'var(--ink3)'};font-family:var(--mono);font-weight:600">${ax.label}</span>
                <span style="font-size:11px;font-family:var(--mono);font-weight:700;color:${ok ? ax.color : 'var(--ink2)'}">${cur}<span style="font-size:9px;color:var(--ink4)">/${req}</span>${ok ? ' <span style="color:'+ax.color+'">✓</span>' : ''}</span>
              </div>
              <div style="height:4px;background:var(--bg3);border-radius:2px;overflow:hidden">
                <div style="height:100%;width:${pct}%;background:${ok ? ax.color : ax.color+'80'};border-radius:2px;transition:width .4s"></div>
              </div>
            </div>`;
          }).join('')}
        </div>
        ${conds.length ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">
          ${conds.map(c => {
            const done = !!(m.conds && m.conds[c]);
            return `<span style="font-size:10.5px;padding:3px 8px;border-radius:5px;background:${done?'var(--plat-bg)':'var(--bg)'};border:1px solid ${done?'var(--plat-b)':'var(--rule2)'};color:${done?'var(--plat)':'var(--ink3)'};font-weight:${done?'600':'400'}">${done?'✓':'○'} ${c}</span>`;
          }).join('')}
        </div>` : ''}` : `<div style="font-size:12px;color:var(--master);padding:4px 0">ギルドコアメンバーとして活動中</div>`}

        <div style="display:flex;gap:6px;margin-top:8px;align-items:center">
          <button onclick="openEvalSheet('${m.id}')" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--rule2);background:transparent;color:var(--ink2);font:12px var(--sans);cursor:pointer">✎ 評価入力</button>
          <select onchange="setRank('${m.id}',this.value);renderPromo()" style="flex:1;padding:7px 10px;border-radius:8px;border:1px solid var(--rule2);background:var(--bg);font:12px var(--sans);color:var(--ink);outline:none;-webkit-appearance:none;background-image:url(\"data:image/svg+xml,%3Csvg viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%238a8780' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E\");background-repeat:no-repeat;background-position:right 8px center;background-size:9px;padding-right:26px">
            ${RANK_ORDER.map(r=>`<option value="${r}" ${r===m.rank?'selected':''}>${RANKS[r].icon} ${RANKS[r].label}</option>`).join('')}
          </select>
        </div>
      </div>`;
    });
  });

  container.innerHTML = html;
}

// ── Eval Sheet ─────────────────────────────────────────────────
function openEvalSheet(mId){
  evalTargetId=mId||null; evalScores={skill:1,growth:1,contrib:1,contin:1};
  const sel=document.getElementById('eval-member-sel');
  sel.innerHTML=MEMBERS.map(m=>`<option value="${m.id}" ${m.id===mId?'selected':''}>${m.name}（${m.disc}）</option>`).join('');
  if(mId) onEvalMemberChange(mId);
  buildEvalAxes();
  // フォルダ選択でraidメンバー欄の表示切替
  document.getElementById('ev-folder').onchange = function(){
    document.getElementById('ev-raid-wrap').style.display = this.value==='レイド'?'block':'none';
  };
  openSheet('sheet-eval');
}

function onEvalMemberChange(id){
  evalTargetId=id;
  const m=MEMBERS.find(x=>x.id===id);
  if(m){
    document.getElementById('eval-target-label').textContent=`${m.name} · ${RANKS[m.rank].label}`;
    evalScores={...m.eval};
    buildEvalAxes();
    buildCondsList(m);
  }
}

function buildEvalAxes(){
  document.getElementById('eval-axes-container').innerHTML=EVAL_AXES.map(ax=>`
    <div class="eval-section">
      <div class="eval-section-label" style="color:${ax.color}">${ax.label}</div>
      <div class="eval-section-desc">${ax.descs.map((d,i)=>`${i+1}:${d}`).join(' / ')}</div>
      <div class="eval-stars" id="stars-${ax.key}">
        ${[1,2,3,4,5].map(i=>`<button class="estar${i<=evalScores[ax.key]?' on':''}" style="${i<=evalScores[ax.key]?'background:'+ax.color+';color:white':''}" onclick="setEvalScore('${ax.key}',${i},'${ax.color}')">${i}</button>`).join('')}
      </div>
      <div class="eval-desc-text" id="edesc-${ax.key}">${ax.descs[evalScores[ax.key]-1]}</div>
    </div>`).join('');
}

function buildCondsList(m){
  const nr=nextRank(m.rank);
  const conds=nr?RANK_NEXT_CONDS[nr]||[]:[];
  const container=document.getElementById('eval-conds-container');
  if(!conds.length){
    container.innerHTML=`<div style="font-size:12px;color:var(--ink4);padding:8px 0 4px">追加条件なし</div>`;
    return;
  }
  if(!m.conds) m.conds={};
  container.innerHTML=conds.map(c=>{
    const checked=!!m.conds[c];
    const cid='cond-'+c.replace(/\s/g,'-');
    return `<label style="display:flex;align-items:center;gap:12px;padding:11px 13px;background:${checked?'var(--plat-bg)':'var(--bg)'};border:1px solid ${checked?'var(--plat-b)':'var(--rule)'};border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .13s" onclick="toggleCond('${m.id}','${c}','${cid}')">
      <div id="${cid}-box" style="width:20px;height:20px;border-radius:5px;border:2px solid ${checked?'var(--plat)':'var(--rule2)'};background:${checked?'var(--plat)':'white'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .13s">
        ${checked?'<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 5.5l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
      </div>
      <span id="${cid}-label" style="font-size:13.5px;color:${checked?'var(--plat)':'var(--ink2)'};font-weight:${checked?'500':'400'}">${c}</span>
      ${checked?'<span style="margin-left:auto;font-size:10px;font-family:var(--mono);color:var(--plat)">✓ 手動</span>':''}
    </label>`;
  }).join('');
}

function toggleCond(mId,cond,cid){
  const m=MEMBERS.find(x=>x.id===mId); if(!m) return;
  if(!m.conds) m.conds={};
  m.conds[cond]=!m.conds[cond];
  buildCondsList(m); // 再描画
}

function setEvalScore(key,val,color){
  evalScores[key]=val;
  const ax=EVAL_AXES.find(a=>a.key===key);
  document.querySelectorAll(`#stars-${key} .estar`).forEach((b,i)=>{
    const on=i+1<=val;
    b.classList.toggle('on',on);
    b.style.background=on?color:'';
    b.style.color=on?'white':'';
  });
  document.getElementById('edesc-'+key).textContent=ax?ax.descs[val-1]:'';
}

function submitEval(){
  if(!evalTargetId){alert('メンバーを選択してください');return;}
  const m=MEMBERS.find(x=>x.id===evalTargetId);
  if(!m) return;
  m.eval={...evalScores};
  // conds はtoggleCondで随時保存済みなので追加処理不要
  const title=document.getElementById('ev-title').value.trim();
  const url=document.getElementById('ev-url').value.trim();
  if(title&&url){
    const sc=Math.min(100,Math.round((evalScores.skill*6+evalScores.growth*4+evalScores.contin*4)*2));
    const folder=document.getElementById('ev-folder').value||'ギャラリー';
    const members=document.getElementById('ev-members').value.trim();
    const F=FOLDER_MAP[folder]||FOLDER_DEFAULT;
    const newWork = {
      id:'W_tmp_'+Date.now(),
      mId:evalTargetId, disc:m.disc,
      title, url, cat:F.label, score:sc,
      fb:document.getElementById('ev-fb').value||'評価済み',
      pub:'公開', folder,
      members: members||'',
      date:new Date().toISOString().slice(0,10),
      th:F.th, icon:F.icon, catC:'wcat-doc'
    };
    WORKS.unshift(newWork);
    document.getElementById('ev-title').value='';
    document.getElementById('ev-url').value='';
    document.getElementById('ev-fb').value='';
    document.getElementById('ev-members').value='';
    // GASに作品を保存
    gasPost({
      action:'addWork',
      mId:evalTargetId, disc:m.disc,
      title, url, score:sc, folder, members,
      fb:newWork.fb, pub:'公開',
      date:newWork.date, th:F.th, icon:F.icon,
    }).then(res => {
      if(res && res.id) {
        const w = WORKS.find(x => x.id === newWork.id);
        if(w) w.id = res.id;
      }
    }).catch(() => console.warn('作品の保存に失敗'));
  }
  closeSheet('sheet-eval');
  alert(`${m.name} の評価を保存しました`);

  // GASに非同期保存
  gasPost({
    action: 'updateMember',
    id:      m.id,
    skill:   evalScores.skill,
    growth:  evalScores.growth,
    contrib: evalScores.contrib,
    contin:  evalScores.contin,
    conds:   JSON.stringify(m.conds || {}),
  }).catch(() => console.warn('評価の保存に失敗しました'));

  renderDash();
  if(document.getElementById('page-members').classList.contains('on')) renderMembers();
  if(document.getElementById('page-promotion').classList.contains('on')) renderPromo();
}

// ── Add Member ─────────────────────────────────────────────────
function submitAddMember(){
  const name=document.getElementById('add-name').value.trim();
  const disc=document.getElementById('add-disc').value.trim();
  if(!name||!disc){alert('本名とDiscord名は必須です');return;}
  const rank=document.getElementById('add-rank').value; // 英語キー
  const newMember = {
    action:'addMember',
    name, disc,
    email:  document.getElementById('add-email').value,
    rank:   rankToJa(rank),
    join:   new Date().toISOString().slice(0,10),
    media:  document.getElementById('add-media').value === '紹介'
              ? '紹介（' + (document.getElementById('add-referrer').value.trim()||'不明') + '）'
              : document.getElementById('add-media').value,
    resume: document.getElementById('add-resume').value,
    memo:   document.getElementById('add-memo').value.trim(),
  };

  // ローカルに即時追加（楽観的UI）
  const localId = 'M_tmp_' + Date.now();
  MEMBERS.push({
    id: localId, ...newMember,
    status:'アクティブ', port:'',
    eval:{skill:1,growth:1,contrib:1,contin:1}, conds:{}, memo: newMember.memo || '',
  });
  ['add-name','add-disc','add-email','add-resume','add-referrer'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('referrer-wrap').style.display='none';
  closeSheet('sheet-addmember');
  renderDash();

  // GASに非同期保存
  gasPost(newMember).then(res => {
    if(res.ok && res.id) {
      // 仮IDを本IDに置換
      const m = MEMBERS.find(x => x.id === localId);
      if(m) m.id = res.id;
    }
  }).catch(() => alert('保存に失敗しました。通信を確認してください。'));

  alert(`${name} を追加しました`);
}

// ── Sheet open/close ───────────────────────────────────────────
function openSheet(id){ document.getElementById(id).classList.add('on'); document.body.style.overflow='hidden'; }
function closeSheet(id,e){
  if(e&&e.target!==document.getElementById(id)) return;
  document.getElementById(id).classList.remove('on'); document.body.style.overflow='';
}

// ── Search ─────────────────────────────────────────────────────
function toggleSearch(){
  const bar=document.getElementById('search-bar');
  const on=bar.classList.toggle('on');
  if(on) setTimeout(()=>document.getElementById('search-input').focus(),50);
  else document.getElementById('search-input').value='';
}

function doSearch(q){
  // ヘッダー検索欄はページ内検索欄に転送するだけ
  const activePage=document.querySelector('.page.on');
  if(!activePage) return;
  if(activePage.id==='page-members'){
    const el=document.getElementById('member-search');
    if(el){ el.value=q; renderMembers(); }
  } else if(activePage.id==='page-gallery'){
    const el=document.getElementById('gallery-search');
    if(el){ el.value=q; renderGallery(); }
  } else {
    if(!q) return;
    nav('members',document.getElementById('nav-members'));
    setTimeout(()=>{
      const el=document.getElementById('member-search');
      if(el){ el.value=q; renderMembers(); }
    },50);
  }
}


// ── PWA Install ────────────────────────────────────────────────
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  document.getElementById('install-banner').classList.add('on');
});
document.getElementById('install-btn').addEventListener('click',async()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome}=await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById('install-banner').classList.remove('on');
});
window.addEventListener('appinstalled',()=>{
  document.getElementById('install-banner').classList.remove('on');
});


// ── Theme toggle ───────────────────────────────────────────────
(function(){
  // OS設定を初期値に反映
  const saved = localStorage.getItem('fl-theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
  } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
    document.documentElement.setAttribute('data-theme', 'light');
  }
  // theme-colorも更新
  function updateMetaColor() {
    const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    document.querySelector('meta[name="theme-color"]').content = isDark ? '#0d0d0d' : '#f8f6f2';
    const btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = isDark ? '☀️' : '🌙';
  }
  updateMetaColor();
  window.__updateMetaColor = updateMetaColor;
})();

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('fl-theme', next);
  window.__updateMetaColor && window.__updateMetaColor();
}

// ── Init（GASからメンバーを読み込む）─────────────────────────
async function init() {
  showLoading(true);
  try {
    const data = await gasGet('getAll');
    if (data && data.members) {
      MEMBERS = data.members.map(row => ({
        id:     row.id     || '',
        name:   row.name   || '',
        disc:   row.disc   || '',
        email:  row.email  || '',
        rank:   normalizeRank(row.rank),
        join:   row.join   || '',
        media:  row.media  || '',
        status: row.status || 'アクティブ',
        port:   '',
        resume: row.resume || '',
        eval: {
          skill:  Number(row.skill)  || 1,
          growth: Number(row.growth) || 1,
          contrib:Number(row.contrib)|| 1,
          contin: Number(row.contin) || 1,
        },
        conds: (() => { try { return JSON.parse(row.conds||'{}'); } catch(e){ return {}; } })(),
        memo: row.memo || '',
      }));
    }
    if (data && data.works) {
      WORKS = data.works.map(row => ({
        id:    row.id    || '',
        mId:   row.mId   || '',
        disc:  row.disc  || '',
        title: row.title || '',
        date:  row.date  || '',
        url:   row.url   || '#',
        score: Number(row.score) || 0,
        fb:    row.fb    || '',
        pub:   row.pub   || '公開',
        th:    row.th    || 'wt-a',
        icon:  row.icon  || '📎',
        folder: normalizeFolder(row.folder),
        members: row.members || '',
        cat:   '作品', catC:'wcat-doc',
      }));
    }
    if (data && data.apps) {
      APPS = data.apps.map(row => ({
        id:     row.id     || '',
        date:   row.date   || '',
        name:   row.name   || '',
        disc:   row.disc   || '',
        email:  row.email  || '',
        media:  row.media  || '',
        score:  Number(row.score) || 0,
        status: row.status || '書類審査中',
        owner:  row.owner  || '',
        url:    row.url    || '#',
        resume: row.resume || '',
      }));
    }

    // 週次活動データを取得
    const weeklyData = await gasGet('getWeekly');
    if (weeklyData && weeklyData.weekly) {
      WEEKLY = weeklyData.weekly.map(row => ({
        weekStart:        String(row.weekStart || '').slice(0,10),
        userId:           String(row.userId || ''),
        username:         row.username || '',
        totalMessages:    Number(row.totalMessages) || 0,
        totalAttachments: Number(row.totalAttachments) || 0,
        制作相談:         Number(row['制作相談']) || 0,
        トレーニング提出: Number(row['トレーニング提出']) || 0,
        クエスト提出:     Number(row['クエスト提出']) || 0,
        作品ギャラリー:   Number(row['作品ギャラリー']) || 0,
        成果共有:         Number(row['成果共有']) || 0,
        雑談:             Number(row['雑談']) || 0,
        インスピレーション: Number(row['インスピレーション']) || 0,
        ゲームトーク:     Number(row['ゲームトーク']) || 0,
        レイド募集:       Number(row['レイド募集']) || 0,
      }));
    }
  } catch(e) {
    console.warn('GAS読み込み失敗:', e);
  }
  showLoading(false);
  renderDash();
}

function showLoading(show) {
  let el = document.getElementById('loading-overlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loading-overlay';
    el.style.cssText = 'position:fixed;inset:0;background:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px';
    el.innerHTML = `
      <div style="width:36px;height:36px;border:3px solid var(--rule2);border-top-color:var(--diamond);border-radius:50%;animation:spin .8s linear infinite"></div>
      <div style="font-size:13px;color:var(--ink3)">データを読み込み中...</div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
    document.body.appendChild(el);
  }
  el.style.display = show ? 'flex' : 'none';
}

init();
